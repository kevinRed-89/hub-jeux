<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Associe les niveaux de langue</title>
  <style>
    :root {
      --bg1: #f7fbff;
      --bg2: #e9f3ff;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #f97316;
      --purple: #7c3aed;
      --text: #172033;
      --muted: #64748b;
      --card: #ffffff;
      --border: #dbe7f5;
      --shadow: 0 18px 45px rgba(30, 64, 175, 0.14);
      --soft-shadow: 0 8px 22px rgba(15, 23, 42, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.28), transparent 34%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      justify-content: center;
      padding: 22px;
    }

    .app {
      width: min(1180px, 100%);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    header {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 18px 22px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.8rem, 3.2vw, 3rem);
      color: var(--blue-dark);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 1.4vw, 1.25rem);
      line-height: 1.35;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 13px 18px;
      font-family: inherit;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: var(--soft-shadow);
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .primary { background: var(--blue); color: white; }
    .secondary { background: white; color: var(--blue-dark); border: 1px solid var(--border); }
    .validate { background: var(--green); color: white; font-size: clamp(1.1rem, 1.8vw, 1.45rem); padding: 16px 24px; }

    .panel {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .status-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .status-card {
      background: #f8fbff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 13px 15px;
      text-align: center;
      font-weight: 800;
      color: var(--blue-dark);
      font-size: clamp(1rem, 1.6vw, 1.35rem);
    }

    .instruction {
      text-align: center;
      font-size: clamp(1.05rem, 1.6vw, 1.35rem);
      line-height: 1.4;
      color: var(--text);
      margin: 0 0 20px;
      font-weight: 700;
    }

    .game-grid {
      display: grid;
      grid-template-columns: 1.25fr 0.9fr;
      gap: 20px;
      align-items: stretch;
    }

    .sentences, .levels {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section-title {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 900;
      text-align: center;
    }

    .sentence-card {
      background: var(--card);
      border: 3px solid transparent;
      border-radius: 24px;
      padding: 18px 20px;
      min-height: 92px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: clamp(1.25rem, 2.3vw, 2rem);
      line-height: 1.25;
      font-weight: 800;
      box-shadow: var(--soft-shadow);
      cursor: pointer;
      user-select: none;
      transition: transform 0.13s ease, border-color 0.13s ease, background 0.13s ease;
    }

    .sentence-card:hover { transform: translateY(-2px); }
    .sentence-card.selected {
      border-color: var(--blue);
      background: #eff6ff;
    }
    .sentence-card.assigned {
      background: #f8fafc;
    }
    .sentence-card.correct {
      border-color: var(--green);
      background: #ecfdf5;
    }
    .sentence-card.wrong {
      border-color: var(--red);
      background: #fef2f2;
    }

    .level-zone {
      background: #f8fbff;
      border: 3px dashed #bfdbfe;
      border-radius: 24px;
      min-height: 116px;
      padding: 13px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color 0.13s ease, background 0.13s ease, transform 0.13s ease;
    }

    .level-zone:hover {
      border-color: var(--blue);
      background: #eff6ff;
      transform: translateY(-1px);
    }

    .level-zone.correct { border-color: var(--green); background: #ecfdf5; }
    .level-zone.wrong { border-color: var(--red); background: #fef2f2; }

    .level-label {
      display: inline-flex;
      width: fit-content;
      align-self: center;
      border-radius: 999px;
      padding: 8px 14px;
      color: white;
      font-weight: 900;
      font-size: clamp(1.05rem, 1.8vw, 1.45rem);
    }

    .familier .level-label { background: var(--orange); }
    .courant .level-label { background: var(--blue); }
    .soutenu .level-label { background: var(--purple); }

    .drop-text {
      min-height: 30px;
      text-align: center;
      font-weight: 800;
      font-size: clamp(0.95rem, 1.4vw, 1.2rem);
      color: var(--text);
    }

    .drop-hint {
      color: var(--muted);
      font-weight: 700;
      font-size: clamp(0.85rem, 1.2vw, 1rem);
    }

    .bottom-bar {
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .feedback {
      flex: 1;
      min-height: 42px;
      font-size: clamp(1.05rem, 1.6vw, 1.35rem);
      font-weight: 900;
      color: var(--blue-dark);
    }

    .feedback.good { color: var(--green); }
    .feedback.bad { color: var(--red); }

    .hidden { display: none !important; }

    .end-screen {
      text-align: center;
      padding: 30px 15px 10px;
    }

    .end-screen h2 {
      font-size: clamp(2rem, 4vw, 4rem);
      color: var(--blue-dark);
      margin: 0 0 10px;
    }

    .end-screen p {
      font-size: clamp(1.25rem, 2vw, 1.7rem);
      font-weight: 800;
      color: var(--text);
    }

    .fullscreen-mode body { padding: 10px; }

    body.big-mode header {
      padding: 10px 16px;
    }

    body.big-mode h1 { font-size: clamp(1.25rem, 2vw, 2rem); }
    body.big-mode .subtitle { display: none; }
    body.big-mode .panel { padding: 16px; }
    body.big-mode .status-bar { margin-bottom: 10px; }
    body.big-mode .instruction { margin-bottom: 12px; }
    body.big-mode .sentence-card { min-height: 120px; font-size: clamp(1.8rem, 3.2vw, 3.1rem); }
    body.big-mode .level-zone { min-height: 135px; }
    body.big-mode .level-label { font-size: clamp(1.35rem, 2.3vw, 2rem); }

    @media (max-width: 820px) {
      body { padding: 12px; }
      header { grid-template-columns: 1fr; }
      .top-actions { justify-content: stretch; }
      .top-actions button { flex: 1; }
      .status-bar { grid-template-columns: 1fr; }
      .game-grid { grid-template-columns: 1fr; }
      .sentence-card { min-height: 82px; }
      .bottom-bar { flex-direction: column; align-items: stretch; }
      .feedback { text-align: center; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Niveaux de langue</h1>
        <p class="subtitle">Associe chaque phrase avec le bon niveau : familier, courant ou soutenu.</p>
      </div>
      <div class="top-actions">
        <button class="secondary" id="bigBtn">Agrandir</button>
        <button class="secondary" id="resetBtn">Recommencer</button>
      </div>
    </header>

    <section class="panel" id="gamePanel">
      <div class="status-bar">
        <div class="status-card" id="questionInfo">Question 1 / 10</div>
        <div class="status-card" id="scoreInfo">Score : 0</div>
        <div class="status-card" id="attemptInfo">Essais : 0</div>
      </div>

      <p class="instruction">Clique d'abord sur une phrase, puis sur le niveau de langue qui lui correspond.</p>

      <div class="game-grid">
        <div>
          <p class="section-title">Phrases</p>
          <div class="sentences" id="sentences"></div>
        </div>

        <div>
          <p class="section-title">Niveaux</p>
          <div class="levels" id="levels"></div>
        </div>
      </div>

      <div class="bottom-bar">
        <div class="feedback" id="feedback"></div>
        <button class="validate" id="validateBtn">Valider</button>
      </div>
    </section>

    <section class="panel end-screen hidden" id="endScreen">
      <h2>Bravo !</h2>
      <p id="finalScore"></p>
      <button class="primary" id="playAgainBtn">Rejouer</button>
    </section>
  </main>

  <script>
    const trios = [
      {
        sens: "avoir faim",
        familier: "J'ai la dalle.",
        courant: "J'ai faim.",
        soutenu: "Je ressens la faim."
      },
      {
        sens: "être fatigué",
        familier: "Je suis crevé.",
        courant: "Je suis fatigué.",
        soutenu: "Je suis épuisé."
      },
      {
        sens: "partir",
        familier: "Je file.",
        courant: "Je pars.",
        soutenu: "Je m'en vais."
      },
      {
        sens: "un enfant",
        familier: "Le gamin joue dehors.",
        courant: "L'enfant joue dehors.",
        soutenu: "Le jeune garçon joue dehors."
      },
      {
        sens: "regarder",
        familier: "Je mate le dessin.",
        courant: "Je regarde le dessin.",
        soutenu: "J'observe le dessin."
      },
      {
        sens: "une voiture",
        familier: "La bagnole est rouge.",
        courant: "La voiture est rouge.",
        soutenu: "L'automobile est rouge."
      },
      {
        sens: "se tromper",
        familier: "Je me plante.",
        courant: "Je me trompe.",
        soutenu: "Je fais une erreur."
      },
      {
        sens: "parler",
        familier: "Tu causes trop fort.",
        courant: "Tu parles trop fort.",
        soutenu: "Tu t'exprimes trop fort."
      },
      {
        sens: "la maison",
        familier: "Je rentre à la baraque.",
        courant: "Je rentre à la maison.",
        soutenu: "Je regagne mon domicile."
      },
      {
        sens: "manger",
        familier: "Il bouffe une pomme.",
        courant: "Il mange une pomme.",
        soutenu: "Il déguste une pomme."
      }
    ];

    const levelNames = ["familier", "courant", "soutenu"];
    const levelLabels = {
      familier: "Familier",
      courant: "Courant",
      soutenu: "Soutenu"
    };

    let questionOrder = [];
    let currentIndex = 0;
    let score = 0;
    let attempts = 0;
    let selectedSentenceId = null;
    let assignments = {};
    let locked = false;

    const questionInfo = document.getElementById("questionInfo");
    const scoreInfo = document.getElementById("scoreInfo");
    const attemptInfo = document.getElementById("attemptInfo");
    const sentencesEl = document.getElementById("sentences");
    const levelsEl = document.getElementById("levels");
    const feedbackEl = document.getElementById("feedback");
    const validateBtn = document.getElementById("validateBtn");
    const resetBtn = document.getElementById("resetBtn");
    const playAgainBtn = document.getElementById("playAgainBtn");
    const gamePanel = document.getElementById("gamePanel");
    const endScreen = document.getElementById("endScreen");
    const finalScore = document.getElementById("finalScore");
    const bigBtn = document.getElementById("bigBtn");

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function startGame() {
      questionOrder = shuffle(trios);
      currentIndex = 0;
      score = 0;
      attempts = 0;
      locked = false;
      gamePanel.classList.remove("hidden");
      endScreen.classList.add("hidden");
      renderQuestion();
    }

    function renderQuestion() {
      selectedSentenceId = null;
      assignments = {};
      locked = false;
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
      validateBtn.disabled = false;

      questionInfo.textContent = `Question ${currentIndex + 1} / ${questionOrder.length}`;
      scoreInfo.textContent = `Score : ${score}`;
      attemptInfo.textContent = `Essais : ${attempts}`;

      const trio = questionOrder[currentIndex];
      const sentenceItems = shuffle(levelNames.map(level => ({
        id: crypto.randomUUID ? crypto.randomUUID() : `${level}-${Math.random()}`,
        text: trio[level],
        level
      })));

      sentencesEl.innerHTML = "";
      sentenceItems.forEach(item => {
        const card = document.createElement("div");
        card.className = "sentence-card";
        card.textContent = item.text;
        card.dataset.id = item.id;
        card.dataset.level = item.level;
        card.addEventListener("click", () => selectSentence(item.id));
        sentencesEl.appendChild(card);
      });

      levelsEl.innerHTML = "";
      levelNames.forEach(level => {
        const zone = document.createElement("div");
        zone.className = `level-zone ${level}`;
        zone.dataset.level = level;
        zone.innerHTML = `
          <div class="level-label">${levelLabels[level]}</div>
          <div class="drop-text"><span class="drop-hint">Clique ici après avoir choisi une phrase.</span></div>
        `;
        zone.addEventListener("click", () => assignToLevel(level));
        levelsEl.appendChild(zone);
      });
    }

    function selectSentence(id) {
      if (locked) return;
      selectedSentenceId = id;
      document.querySelectorAll(".sentence-card").forEach(card => {
        card.classList.toggle("selected", card.dataset.id === id);
      });
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
    }

    function assignToLevel(level) {
      if (locked) return;
      if (!selectedSentenceId) {
        feedbackEl.textContent = "Choisis d'abord une phrase.";
        feedbackEl.className = "feedback bad";
        return;
      }

      Object.keys(assignments).forEach(existingLevel => {
        if (assignments[existingLevel] === selectedSentenceId) {
          delete assignments[existingLevel];
        }
      });

      assignments[level] = selectedSentenceId;
      selectedSentenceId = null;
      updateDisplayAssignments();
    }

    function updateDisplayAssignments() {
      document.querySelectorAll(".sentence-card").forEach(card => {
        card.classList.remove("selected", "assigned", "correct", "wrong");
      });
      document.querySelectorAll(".level-zone").forEach(zone => {
        zone.classList.remove("correct", "wrong");
        const level = zone.dataset.level;
        const dropText = zone.querySelector(".drop-text");
        const sentenceId = assignments[level];
        if (sentenceId) {
          const card = document.querySelector(`.sentence-card[data-id="${sentenceId}"]`);
          card.classList.add("assigned");
          dropText.textContent = card.textContent;
        } else {
          dropText.innerHTML = '<span class="drop-hint">Clique ici après avoir choisi une phrase.</span>';
        }
      });
    }

    function validateQuestion() {
      if (locked) return;
      if (Object.keys(assignments).length < 3) {
        feedbackEl.textContent = "Associe les trois phrases avant de valider.";
        feedbackEl.className = "feedback bad";
        return;
      }

      attempts++;
      let allCorrect = true;

      document.querySelectorAll(".level-zone").forEach(zone => {
        const level = zone.dataset.level;
        const sentenceId = assignments[level];
        const card = document.querySelector(`.sentence-card[data-id="${sentenceId}"]`);
        const correct = card && card.dataset.level === level;
        zone.classList.add(correct ? "correct" : "wrong");
        card.classList.add(correct ? "correct" : "wrong");
        if (!correct) allCorrect = false;
      });

      attemptInfo.textContent = `Essais : ${attempts}`;

      if (allCorrect) {
        locked = true;
        score++;
        scoreInfo.textContent = `Score : ${score}`;
        feedbackEl.textContent = "Bravo, c'est réussi !";
        feedbackEl.className = "feedback good";
        validateBtn.disabled = true;
        setTimeout(nextQuestion, 950);
      } else {
        feedbackEl.textContent = "Il y a une erreur. Corrige puis valide à nouveau.";
        feedbackEl.className = "feedback bad";
        setTimeout(() => {
          document.querySelectorAll(".sentence-card").forEach(card => card.classList.remove("correct", "wrong"));
          document.querySelectorAll(".level-zone").forEach(zone => zone.classList.remove("correct", "wrong"));
        }, 850);
      }
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= questionOrder.length) {
        showEndScreen();
      } else {
        renderQuestion();
      }
    }

    function showEndScreen() {
      gamePanel.classList.add("hidden");
      endScreen.classList.remove("hidden");
      finalScore.textContent = `Tu as réussi ${score} question${score > 1 ? "s" : ""} sur ${questionOrder.length}. Nombre d'essais : ${attempts}.`;
    }

    validateBtn.addEventListener("click", validateQuestion);
    resetBtn.addEventListener("click", startGame);
    playAgainBtn.addEventListener("click", startGame);
    bigBtn.addEventListener("click", () => {
      document.body.classList.toggle("big-mode");
      bigBtn.textContent = document.body.classList.contains("big-mode") ? "Réduire" : "Agrandir";
    });

    startGame();
  </script>
</body>
</html>
