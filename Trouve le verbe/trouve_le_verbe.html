<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trouve le verbe</title>
  <style>
    :root{
      --bg1:#eef4ff;
      --bg2:#fff6ef;
      --panel:#ffffff;
      --text:#1f1f1f;
      --accent:#4f46e5;
      --accent-dark:#3730a3;
      --good:#1f9d55;
      --bad:#d64545;
      --soft:#6b7280;
      --shadow:0 14px 34px rgba(0,0,0,.12);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color:var(--text);
      padding:24px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .app{
      width:min(1400px, 100%);
      background:var(--panel);
      border-radius:32px;
      box-shadow:var(--shadow);
      padding:28px 28px 36px;
    }

    h1{
      margin:0 0 10px;
      text-align:center;
      font-size:clamp(2rem, 3vw, 3rem);
      color:var(--accent-dark);
    }

    .subtitle{
      margin:0 0 22px;
      text-align:center;
      font-size:clamp(1rem, 1.5vw, 1.35rem);
      color:#374151;
    }

    .topbar{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:16px;
      margin-bottom:24px;
    }

    .btn{
      border:none;
      border-radius:18px;
      padding:16px 24px;
      font-size:clamp(1rem, 1.4vw, 1.3rem);
      font-weight:700;
      cursor:pointer;
      box-shadow:0 6px 14px rgba(0,0,0,.10);
      transition:transform .08s ease, background .2s ease, opacity .2s ease;
    }

    .btn:hover{ transform:translateY(-2px); }
    .btn:active{ transform:translateY(0); }

    .btn-primary{
      background:var(--accent);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--accent-dark);
    }

    .btn-secondary{
      background:#e5e7eb;
      color:#111827;
    }

    .btn-secondary:hover{
      background:#d1d5db;
    }

    .info{
      margin:0 auto 28px;
      width:min(1000px, 100%);
      background:#f8fafc;
      border-radius:22px;
      padding:18px 22px;
      text-align:center;
      font-size:clamp(1.15rem, 1.7vw, 1.55rem);
      line-height:1.5;
      min-height:88px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: inset 0 0 0 2px #e5e7eb;
    }

    .info.good{
      background:#eefbf3;
      box-shadow: inset 0 0 0 2px #b7ebcb;
      color:#0f6b38;
    }

    .info.bad{
      background:#fff1f1;
      box-shadow: inset 0 0 0 2px #f2b8b8;
      color:#a12626;
    }

    .game-area{
      background:#fcfcff;
      border-radius:28px;
      padding:42px 28px;
      min-height:320px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: inset 0 0 0 3px #ececff;
    }

    .sentence{
      text-align:center;
      line-height:2.15;
      font-size:clamp(2rem, 3.8vw, 4rem);
      font-weight:700;
    }

    .word{
      appearance:none;
      border:none;
      background:transparent;
      color:inherit;
      font:inherit;
      padding:0 .04em;
      margin:0;
      border-radius:10px;
      cursor:pointer;
      display:inline;
      transition:background .15s ease, color .15s ease;
    }

    .word:hover{
      background:rgba(79,70,229,.10);
    }

    .word:active{
      transform:none;
    }

    .word.wrong{
      color:var(--bad);
      background:rgba(214,69,69,.10);
    }

    .word.correct{
      color:var(--good);
      background:rgba(31,157,85,.12);
    }

    .word.disabled{
      cursor:default;
    }

    .punct{
      display:inline;
    }

    .legend{
      margin-top:22px;
      text-align:center;
      color:#4b5563;
      font-size:clamp(1rem, 1.35vw, 1.2rem);
      line-height:1.5;
    }

    .bottomline{
      margin-top:18px;
      text-align:center;
      font-size:clamp(1rem, 1.35vw, 1.15rem);
      color:var(--soft);
    }

    .highlight{
      font-weight:700;
    }

    .count{
      font-weight:700;
      color:#111827;
    }

    button:focus-visible{
      outline:4px solid #f59e0b;
      outline-offset:4px;
    }

    @media (max-width: 900px){
      .app{
        padding:20px 18px 26px;
      }

      .game-area{
        padding:28px 14px;
        min-height:240px;
      }

      .info{
        min-height:78px;
        padding:14px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Trouve le verbe</h1>
    <p class="subtitle">Lis la phrase. Clique sur le verbe.</p>

    <div class="topbar">
      <button id="newSentenceBtn" class="btn btn-primary">Nouvelle phrase</button>
      <button id="showAnswerBtn" class="btn btn-secondary">Voir la réponse</button>
    </div>

    <div id="infoBox" class="info">
      Trouve le verbe dans la phrase.
    </div>

    <section class="game-area">
      <div id="sentence" class="sentence" aria-live="polite"></div>
    </section>

    <div class="legend">
      Les mots sur lesquels on s'est trompé restent en <span class="highlight" style="color:#d64545;">rouge</span>.<br>
      Le verbe apparaît en <span class="highlight" style="color:#1f9d55;">vert</span> quand on le trouve ou quand on clique sur <span class="highlight">Voir la réponse</span>.
    </div>

    <div class="bottomline">
      Nombre d'erreurs sur cette phrase : <span id="errorCount" class="count">0</span>
    </div>
  </main>

  <script>
    const sentenceEl = document.getElementById("sentence");
    const infoBox = document.getElementById("infoBox");
    const errorCountEl = document.getElementById("errorCount");
    const newSentenceBtn = document.getElementById("newSentenceBtn");
    const showAnswerBtn = document.getElementById("showAnswerBtn");

    let currentRound = null;

    function randomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function makeSentenceFromParts(parts, verbText) {
      const tokens = [];

      parts.forEach((part, partIndex) => {
        const words = part.split(" ");

        words.forEach((word, wordIndex) => {
          if (word.endsWith(",")) {
            const cleanWord = word.slice(0, -1);

            if (cleanWord) {
              tokens.push({
                type: "word",
                text: cleanWord,
                isVerb: cleanWord.toLowerCase() === verbText.toLowerCase()
              });
            }

            tokens.push({
              type: "punct",
              text: ","
            });
          } else {
            tokens.push({
              type: "word",
              text: word,
              isVerb: word.toLowerCase() === verbText.toLowerCase()
            });
          }

          if (wordIndex < words.length - 1) {
            tokens.push({ type: "space", text: " " });
          }
        });

        if (partIndex < parts.length - 1) {
          tokens.push({ type: "space", text: " " });
        }
      });

      tokens.push({ type: "punct", text: "." });

      return tokens;
    }

    function buildPattern1() {
      const subjects = [
        "Le chat",
        "Le chien",
        "Le lapin",
        "Le garçon",
        "La fille",
        "Tom",
        "Léa",
        "La maîtresse"
      ];

      const verbs = [
       "regarde",
       "cherche",
       "trouve",
       "porte",
       "montre",
       "pousse",
       "attrape",
       "touche",
       "prend",
       "cache",
       "ramasse",
       "lance",
       "secoue",
       "ouvre",
       "ferme",
       "dépose",
       "replace",
       "soulève",
       "traîne",
       "apporte",
       "emporte",
       "utilise",
       "observe",
       "désigne",
       "serre",
       "pose",
       "retrouve",
       "range"
      ];

      const objects = [
        "la balle",
        "le livre",
        "la trousse",
        "la porte",
        "la boîte",
        "le ballon",
        "la chaise",
        "la table"
      ];

      const subject = randomItem(subjects);
      const verb = randomItem(verbs);
      const object = randomItem(objects);

      return makeSentenceFromParts([subject, verb, object], verb);
    }

    function buildPattern2() {
      const subjects = [
        "Le petit chat",
        "Le grand chien",
        "Le jeune lapin",
        "Le petit garçon",
        "La petite fille",
        "La grande maîtresse",
        "Le jeune Tom",
        "La petite Léa"
      ];

      const verbs = [
        "regarde",
        "cherche",
        "trouve",
        "porte",
        "montre",
        "pousse",
        "attrape",
        "touche",
        "prend",
        "cache",
        "ramasse",
        "lance",
        "secoue",
        "ouvre",
        "ferme",
        "dépose",
        "replace",
        "soulève",
        "traîne",
        "apporte",
        "emporte",
        "utilise",
        "observe",
        "désigne",
        "serre",
        "pose",
        "retrouve",
        "range"
      ];

      const objects = [
        "la balle",
        "le livre",
        "la trousse",
        "la porte",
        "la boîte",
        "le ballon",
        "la chaise",
        "la table"
      ];

      const subject = randomItem(subjects);
      const verb = randomItem(verbs);
      const object = randomItem(objects);

      return makeSentenceFromParts([subject, verb, object], verb);
    }

    function buildPattern3() {
      const starters = [
        "Dans la cour,",
        "Dans la classe,",
        "Ce matin,",
        "À l'école,",
        "Sur le tapis,"
      ];

      const subjects = [
        "Tom",
        "Léa",
        "un garçon",
        "cette fille",
        "notre maîtresse",
        "mon chat"
      ];

      const verbs = [
        "regarde",
        "cherche",
        "trouve",
        "porte",
        "montre",
        "attrape",
        "prend",
        "cache",
        "ramasse",
        "ouvre",
        "ferme",
        "dépose",
        "apporte",
        "emporte",
        "observe",
        "désigne",
        "pose",
        "retrouve",
        "range",
        "soulève",
        "utilise",
        "touche",
        "pousse",
        "secoue",
        "lance",
        "serre"
      ];

      const objects = [
        "la balle",
        "le livre",
        "la trousse",
        "le ballon",
        "la boîte",
        "la chaise"
      ];

      const starter = randomItem(starters);
      const subject = randomItem(subjects);
      const verb = randomItem(verbs);
      const object = randomItem(objects);

      return makeSentenceFromParts([starter, subject, verb, object], verb);
    }

    function buildPattern4() {
      const subjects = [
        "Le chat",
        "Le chien",
        "Le lapin",
        "Le garçon",
        "La fille",
        "Tom",
        "Léa"
      ];

      const verbs = [
        "court",
        "saute",
        "marche",
        "joue",
        "reste",
        "attend",
        "avance",
        "recule",
        "grimpe",
        "trottine",
        "file",
        "entre",
        "sort",
        "retourne",
        "tourne",
        "patiente",
        "glisse",
        "bondit",
        "fonce",
        "arrive",
        "dessine",
        "circule",
        "apprend",
        "mange",
        "dort",
        "accélère"
      ];

      const places = [
        "dans la cour",
        "dans la classe",
        "sur le tapis",
        "près du mur",
        "dans le jardin",
        "à l'école"
      ];

      const subject = randomItem(subjects);
      const verb = randomItem(verbs);
      const place = randomItem(places);

      return makeSentenceFromParts([subject, verb, place], verb);
    }

    function buildPattern5() {
      const subjects = [
        "Le maire de la ville",
        "Le directeur de l'école",
        "Le gardien du parc",
        "La dame de la ferme",
        "Le voisin de Tom",
        "La maman de Léa"
      ];

      const verbs = [
        "pousse",
        "porte",
        "montre",
        "cherche",
        "regarde",
        "touche",
        "prend",
        "cache",
        "ramasse",
        "ouvre",
        "ferme",
        "dépose",
        "replace",
        "soulève",
        "traîne",
        "apporte",
        "emporte",
        "utilise",
        "observe",
        "désigne",
        "serre",
        "pose",
        "retrouve",
        "range",
        "attrape",
        "secoue"
      ];

      const objects = [
        "la porte",
        "la boîte",
        "le ballon",
        "le livre",
        "la table",
        "la chaise"
      ];

      const subject = randomItem(subjects);
      const verb = randomItem(verbs);
      const object = randomItem(objects);

      return makeSentenceFromParts([subject, verb, object], verb);
    }

    const builders = [
      buildPattern1,
      buildPattern2,
      buildPattern3,
      buildPattern4,
      buildPattern5
    ];

    function generateRound() {
      const builder = randomItem(builders);
      const tokens = builder();

      currentRound = {
        tokens,
        solved: false,
        answerShown: false,
        wrongIndexes: new Set(),
        correctIndexes: new Set(),
        errorCount: 0
      };

      updateInfo("Trouve le verbe dans la phrase.", "");
      updateErrorCount();
      renderSentence();
    }

    function updateInfo(message, type) {
      infoBox.textContent = message;
      infoBox.classList.remove("good", "bad");

      if (type === "good") {
        infoBox.classList.add("good");
      } else if (type === "bad") {
        infoBox.classList.add("bad");
      }
    }

    function updateErrorCount() {
      errorCountEl.textContent = currentRound.errorCount;
    }

    function renderSentence() {
      sentenceEl.innerHTML = "";

      currentRound.tokens.forEach((token, index) => {
        if (token.type === "word") {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "word";
          btn.textContent = token.text;
          btn.setAttribute("aria-label", token.text);

          if (currentRound.wrongIndexes.has(index)) {
            btn.classList.add("wrong");
          }

          if (currentRound.correctIndexes.has(index)) {
            btn.classList.add("correct");
          }

          if (currentRound.solved || currentRound.answerShown) {
            btn.classList.add("disabled");
          }

          btn.addEventListener("click", () => handleWordClick(index));
          sentenceEl.appendChild(btn);

        } else if (token.type === "punct") {
          const span = document.createElement("span");
          span.className = "punct";
          span.textContent = token.text;
          sentenceEl.appendChild(span);

        } else if (token.type === "space") {
          sentenceEl.appendChild(document.createTextNode(" "));
        }
      });
    }

    function handleWordClick(index) {
      if (currentRound.solved || currentRound.answerShown) {
        return;
      }

      const token = currentRound.tokens[index];
      if (!token || token.type !== "word") {
        return;
      }

      if (token.isVerb) {
        currentRound.correctIndexes.add(index);
        currentRound.solved = true;
        updateInfo(`Bravo ! "${token.text}" est le verbe.`, "good");
      } else {
        if (!currentRound.wrongIndexes.has(index)) {
          currentRound.wrongIndexes.add(index);
          currentRound.errorCount += 1;
          updateErrorCount();
        }
        updateInfo(`"${token.text}" n'est pas le verbe. Continue.`, "bad");
      }

      renderSentence();
    }

    function showAnswer() {
      if (!currentRound) return;

      currentRound.answerShown = true;

      currentRound.tokens.forEach((token, index) => {
        if (token.type === "word" && token.isVerb) {
          currentRound.correctIndexes.add(index);
        }
      });

      const verbs = currentRound.tokens
        .filter(token => token.type === "word" && token.isVerb)
        .map(token => token.text);

      updateInfo(`La réponse est : "${verbs.join(" ")}".`, "good");
      renderSentence();
    }

    newSentenceBtn.addEventListener("click", generateRound);
    showAnswerBtn.addEventListener("click", showAnswer);

    generateRound();
  </script>
</body>
</html>
